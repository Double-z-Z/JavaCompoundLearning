spring:
  application:
    name: redis-counter-service
  
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      
      # Lettuce 连接池配置
      lettuce:
        pool:
          max-active: 50          # 最大连接数
          max-idle: 20            # 最大空闲连接
          min-idle: 5             # 最小空闲连接
          max-wait: 3000ms        # 最大等待时间
        shutdown-timeout: 100ms

# 服务器配置
server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 10

# 日志配置
logging:
  level:
    com.example.counter: DEBUG
    org.springframework.data.redis: INFO
